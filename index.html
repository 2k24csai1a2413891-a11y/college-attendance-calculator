<!DOCTYPE html>
<html>
<head>
  <title>PSIT Attendance Calculator</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      padding: 30px;
      width: 320px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }

    .logo {
      width: 80px;
      margin-bottom: 10px;
      animation: float 3s infinite ease-in-out;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      transition: 0.3s;
    }

    input:focus {
      border-color: #2a5298;
      outline: none;
      transform: scale(1.05);
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #2a5298;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1e3c72;
      transform: scale(1.05);
    }

    #result {
      margin-top: 15px;
      font-size: 16px;
      animation: fadeIn 0.5s ease-in-out;
    }

    .safe {
      color: green;
      font-weight: bold;
    }

    .danger {
      color: red;
      font-weight: bold;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

  </style>

</head>

<body>

<div class="card">

  <!-- LOGO -->
  <img src="logo.png" class="logo">

  <h2>PSIT Attendance</h2>

  <input type="number" id="lecture" placeholder="Total Lectures">
  <input type="number" id="absent" placeholder="Total Absent">
  <input type="number" id="oaa" placeholder="Total OAA">

  <button onclick="calculate()">Calculate</button>

  <p id="result"></p>

</div>

<script src="script.js"></script>

</body>
</html>
